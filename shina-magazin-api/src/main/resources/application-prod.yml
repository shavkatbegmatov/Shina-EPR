# Production profil (Coolify). Faollashtirish: Dockerfile ENTRYPOINT'da
# -Dspring.profiles.active=prod (yoki SPRING_PROFILES_ACTIVE=prod env).
# Barcha ulanish/sirlar ENV'dan — qattiq yozilgan kreditsial YO'Q.
# Boshqa shop.* (storage/payment/notify) va jwt base application.yml'da env-driven.
# Traefik/nginx ortida ishlaydi — X-Forwarded-Proto/Host'ga ishonish
# (og:image kabi absolyut URL'lar https bo'lishi va scheme aniqlanishi uchun)
server:
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shina_epr_db}
    username: ${DB_USERNAME:shina_epr_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  # Vault va Cloud tekshiruvlarini o'chirish (Coolify env ishlatiladi, tashqi Vault yo'q)
  cloud:
    vault:
      enabled: false
    compatibility-verifier:
      enabled: false

# Production logging — faqat muhim loglar
logging:
  level:
    root: WARN
    uz.shinamagazin: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
