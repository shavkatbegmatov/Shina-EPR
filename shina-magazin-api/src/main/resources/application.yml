spring:
  application:
    name: shina-magazin-api

  profiles:
    active: dev

  # Timezone - Toshkent vaqti
  jackson:
    time-zone: Asia/Tashkent
    date-format: yyyy-MM-dd HH:mm:ss

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Tashkent

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8183
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mS1mNCtIuahtLE4Q/OW/eQc/11mONeSU5T1dcGnwX0M=}
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging
logging:
  level:
    root: INFO
    uz.shinamagazin: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web.access: DEBUG
    org.springframework.security.access: DEBUG

# Storefront (/magazin) to'lov sozlamalari. DEFAULT: O'CHIQ (enabled=false).
# Yoqish: tegishli provayder merchant kreditsiallarini env yoki shu yerga qo'ying
# va enabled=true qiling. Webhook URL'lari (provayder kabinetida ro'yxatdan o'tkazing):
#   Payme:  https://<domain>/api/v1/payments/payme
#   Click:  https://<domain>/api/v1/payments/click/prepare  va  .../complete
shop:
  payment:
    return-url: ${SHOP_RETURN_URL:http://localhost:5183/magazin/buyurtma}
    payme:
      enabled: ${PAYME_ENABLED:false}
      merchant-id: ${PAYME_MERCHANT_ID:}
      key: ${PAYME_KEY:}
      checkout-url: https://checkout.paycom.uz
    click:
      enabled: ${CLICK_ENABLED:false}
      merchant-id: ${CLICK_MERCHANT_ID:}
      service-id: ${CLICK_SERVICE_ID:}
      secret-key: ${CLICK_SECRET_KEY:}
      pay-url: https://my.click.uz/services/pay
