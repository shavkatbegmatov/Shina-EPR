spring:
  application:
    name: shina-magazin-api

  profiles:
    active: dev

  # Timezone - Toshkent vaqti
  jackson:
    time-zone: Asia/Tashkent
    date-format: yyyy-MM-dd HH:mm:ss

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Tashkent

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Multipart (rasm upload) — shop.storage.max-size-bytes bilan mos bo'lsin
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 6MB

server:
  port: 8183
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mS1mNCtIuahtLE4Q/OW/eQc/11mONeSU5T1dcGnwX0M=}
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days

# CORS — ruxsat etilgan origin'lar (vergul bilan ajratilgan).
# Prod'da CORS_ALLOWED_ORIGINS env orqali beriladi (masalan https://protektor.uz).
# Brauzer har bir POST'ga Origin yuboradi; proxy ortida scheme farqi tufayli
# same-origin so'rov ham CORS tekshiruvidan o'tadi — ro'yxatda bo'lishi shart.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5183,http://localhost:3000,http://127.0.0.1:5183,http://192.168.1.33:5183}

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging
logging:
  level:
    root: INFO
    uz.shinamagazin: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web.access: DEBUG
    org.springframework.security.access: DEBUG

# Storefront (/) to'lov sozlamalari. DEFAULT: O'CHIQ (enabled=false).
# Yoqish: tegishli provayder merchant kreditsiallarini env yoki shu yerga qo'ying
# va enabled=true qiling. Webhook URL'lari (provayder kabinetida ro'yxatdan o'tkazing):
#   Payme:  https://<domain>/api/v1/payments/payme
#   Click:  https://<domain>/api/v1/payments/click/prepare  va  .../complete
shop:
  # Mijozga buyurtma xabarnomalari (SMS asosiy, email ixtiyoriy). DEFAULT: O'CHIQ.
  # Jonli: SMS uchun provider impl + kreditsial; email uchun spring.mail.* (env) + email.enabled (A-guruhi).
  notify:
    sms:
      enabled: ${SHOP_NOTIFY_SMS:false}
      provider: ${SHOP_NOTIFY_SMS_PROVIDER:log}
    email:
      enabled: ${SHOP_NOTIFY_EMAIL:false}
      from: ${SHOP_NOTIFY_EMAIL_FROM:Protektor <no-reply@protektor.uz>}
      subject-prefix: "Protektor — buyurtma"
  # Mahsulot rasm saqlash (lokal-fayl tizimi). Coolify: `dir`ni persistent volume'ga
  # mount qiling (env SHOP_STORAGE_DIR) — aks holda deploy'da yuklangan rasmlar yo'qoladi.
  storage:
    dir: ${SHOP_STORAGE_DIR:./uploads}
    public-base-url: ${SHOP_STORAGE_PUBLIC_BASE_URL:/api/uploads}
    max-size-bytes: ${SHOP_STORAGE_MAX_SIZE:5242880}
  payment:
    return-url: ${SHOP_RETURN_URL:http://localhost:5183/buyurtma}
    payme:
      enabled: ${PAYME_ENABLED:false}
      merchant-id: ${PAYME_MERCHANT_ID:}
      key: ${PAYME_KEY:}
      checkout-url: https://checkout.paycom.uz
    click:
      enabled: ${CLICK_ENABLED:false}
      merchant-id: ${CLICK_MERCHANT_ID:}
      service-id: ${CLICK_SERVICE_ID:}
      secret-key: ${CLICK_SECRET_KEY:}
      pay-url: https://my.click.uz/services/pay
