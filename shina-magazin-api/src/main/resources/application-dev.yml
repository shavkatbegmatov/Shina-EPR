spring:
  datasource:
    # localhost - Windows/IntelliJ uchun, 172.17.0.1 - WSL uchun
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/shina_epr_db
    username: shina_epr_user
    password: f3300955#F123456
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  # Demo/namuna ma'lumotlar faqat DEV profilida yuklanadi.
  # `classpath:db/demo` (repeatable R__demo_data.sql) shu yerda qo'shiladi —
  # prod (application-prod.yml + Dockerfile -Dspring.profiles.active=prod) uni
  # KO'RMAYDI, ya'ni demo ma'lumot hech qachon productionga tushmaydi.
  flyway:
    locations: classpath:db/migration,classpath:db/demo

  # Vault va Cloud tekshiruvlarini dev muhitda o'chirish
  cloud:
    vault:
      enabled: false
    compatibility-verifier:
      enabled: false

logging:
  level:
    uz.shinamagazin: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
