services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-shina_epr_db}
      POSTGRES_USER: ${DB_USERNAME:-shina_epr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-shina_epr_user} -d ${DB_NAME:-shina_epr_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./shina-magazin-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-shina_epr_db}
      DB_USERNAME: ${DB_USERNAME:-shina_epr_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SHOP_STORAGE_DIR: /data/uploads
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./shina-magazin-front
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
