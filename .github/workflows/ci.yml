name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Bir branchda yangi push bo'lsa, eski ishni bekor qilamiz
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend · lint · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shina-magazin-front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: shina-magazin-front/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (vitest)
        run: npm test

      - name: Build (tsc + vite)
        run: npm run build

  backend:
    name: Backend · compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shina-magazin-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw -B -ntp -DskipTests clean compile
