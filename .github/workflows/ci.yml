name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/shavkatbegmatov/shina-epr

jobs:
  # ── CI: Frontend lint + test + build ──
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shina-magazin-front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shina-magazin-front/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # ── CI: Backend compile ──
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shina-magazin-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: chmod +x mvnw && ./mvnw clean compile -DskipTests -q

  # ── CD: Build Docker images + push to GHCR ──
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./shina-magazin-api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./shina-magazin-front
          push: true
          # OG/sitemap absolyut URL uchun — GitHub repo Variables'da VITE_SITE_URL bering (bo'sh = relativ)
          build-args: |
            VITE_SITE_URL=${{ vars.VITE_SITE_URL }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-front:latest
            ${{ env.IMAGE_PREFIX }}-front:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── CD: Trigger Coolify deploy ──
  # Coolify'da BITTA Compose resurs (infra/coolify/docker-compose.yml) turadi —
  # webhook butun stack'ni qayta deploy qiladi (yangi GHCR image'lar tortiladi).
  # Webhook image'lar push bo'lgandan KEYIN chaqiriladi — eski image tortilib
  # qolish poygasi yo'q (Coolify'ning push-ga bog'langan Auto Deploy'idan farqli).
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [build-and-push]
    # COOLIFY_* secretlar + DEPLOY_ENABLED=true repo Variable qo'yilgach ishlaydi.
    # Aks holda SKIP bo'ladi (CI yashil qoladi, deploy job qizil bermaydi).
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Deploy stack (compose resource webhook)
        run: |
          curl -f -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            --max-time 30
