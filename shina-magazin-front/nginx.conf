# Link-preview/crawler bot User-Agentlari — /mahsulot/{id} uchun server-tomon meta.
# Oddiy brauzer (0) SPA oladi; bot (1) backend SEO endpointiga yo'naltiriladi.
map $http_user_agent $prerender_ua {
    default 0;
    "~*(googlebot|bingbot|yandexbot|duckduckbot|telegrambot|facebookexternalhit|facebot|twitterbot|whatsapp|slackbot|linkedinbot|discordbot|vkshare|skypeuripreview|pinterest|redditbot|applebot)" 1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker ichki DNS resolver — proxy_pass'da variable ishlatilganda nginx startup'da
    # DNS resolve qilmaydi; backend keyin paydo bo'lsa ham ishlay boshlaydi.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Backend host/port (Coolify backend servisi/konteyner nomi). Kerak bo'lsa o'zgartiring.
    set $backend_host "shina-magazin-api";
    set $backend_port "8183";

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Statik asset'lar — uzoq cache (vite hashlangan nom beradi)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API + yuklangan rasmlar (/api/uploads/...) -> backend (same-origin proxy)
    location /api/ {
        proxy_pass http://$backend_host:$backend_port$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket (STOMP/SockJS — real-time bildirishnomalar)
        proxy_read_timeout 86400;
        # Backend mavjud bo'lmasa 502/503/504 (crash o'rniga)
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
    }

    # Mahsulot sahifasi: link-preview bot bo'lsa backend server-meta (og:image = mahsulot
    # rasmi) beriladi; oddiy foydalanuvchi SPA oladi (tez). Faqat crawler backendga tegadi.
    location ~ ^/mahsulot/([0-9]+)/?$ {
        set $pid $1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        if ($prerender_ua) {
            proxy_pass http://$backend_host:$backend_port/api/v1/seo/products/$pid;
        }
        try_files $uri /index.html;
    }

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
