server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # API + yuklangan rasmlar (/api/uploads/...) -> backend (same-origin proxy).
  # "backend" = Coolify'dagi backend servis nomi/hosti (8183). Kerak bo'lsa o'zgartiring.
  location /api/ {
    proxy_pass http://backend:8183/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WebSocket (STOMP/SockJS — real-time bildirishnomalar)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
  }

  # Statik asset'lar — uzoq cache (vite hashlangan nom beradi)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA history fallback — har qanday yo'l index.html'ga
  location / {
    try_files $uri $uri/ /index.html;
  }
}
