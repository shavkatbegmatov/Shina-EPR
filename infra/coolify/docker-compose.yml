# Coolify uchun prod stack (Compose resource sifatida ulanadi).
# Image'lar GITHUB ACTIONS'da quriladi va GHCR'dan tortiladi — serverda
# build YO'Q (minimal yuklama). Private image'lar uchun serverda bir marta:
#   docker login ghcr.io -u shavkatbegmatov -p <PAT read:packages>
# ENV'lar Coolify UI'da beriladi: DB_PASSWORD, JWT_SECRET (majburiy);
# PAYME_*/CLICK_*/SHOP_* — jonli to'lov/xabarnoma yoqilganda.
# Domen Coolify UI'da faqat frontend'ga biriktiriladi (port 80, TLS avtomatik,
# Traefik) — backend tashqariga ochilmaydi, nginx /api ni ichki tarmoqda proxy qiladi.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-shina_epr_db}
      POSTGRES_USER: ${DB_USERNAME:-shina_epr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-shina_epr_user} -d ${DB_NAME:-shina_epr_db}"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    image: ghcr.io/shavkatbegmatov/shina-epr-api:latest
    pull_policy: always
    environment:
      # SPRING_PROFILES_ACTIVE=prod Dockerfile ENTRYPOINT'da
      DB_HOST: db
      DB_NAME: ${DB_NAME:-shina_epr_db}
      DB_USERNAME: ${DB_USERNAME:-shina_epr_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      # Rasm storage — volume'ga yoziladi (deploy'da yo'qolmaydi)
      SHOP_STORAGE_DIR: /data/uploads
      # To'lov (jonli qilganda) — Coolify env'dan
      PAYME_ENABLED: ${PAYME_ENABLED:-false}
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID:-}
      PAYME_KEY: ${PAYME_KEY:-}
      CLICK_ENABLED: ${CLICK_ENABLED:-false}
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID:-}
      CLICK_SERVICE_ID: ${CLICK_SERVICE_ID:-}
      CLICK_SECRET_KEY: ${CLICK_SECRET_KEY:-}
      SHOP_RETURN_URL: ${SHOP_RETURN_URL:-}
      # Xabarnoma (jonli qilganda)
      SHOP_NOTIFY_SMS: ${SHOP_NOTIFY_SMS:-false}
      SHOP_NOTIFY_EMAIL: ${SHOP_NOTIFY_EMAIL:-false}
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8183/api/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  frontend:
    image: ghcr.io/shavkatbegmatov/shina-epr-front:latest
    pull_policy: always
    environment:
      # nginx /api ni shu servisga proxy qiladi (Docker DNS)
      BACKEND_HOST: backend
      BACKEND_PORT: 8183
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
